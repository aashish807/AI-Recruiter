ai_usage_summary: |
  Used Gemini to analyze the job description and candidate schema, design a 5-minute optimized heuristic ranker, identify honeypots, and implement the ranking logic in Python without using LLM APIs during runtime.

methodology_summary: |
  Rule-based ranker with 4 scoring components: tech skills match (with weighting based on proficiency and JD terms), experience years (bell-curve scoring peaking at 6-8 years), industry match (down-weighting pure IT services), and a behavioral signal multiplier (heavily penalizing low response rate and inactivity). Explicit honeypot detection drops candidates with impossible skill durations or >45 years experience. Runtime is ~4 seconds for 100K candidates on CPU.

