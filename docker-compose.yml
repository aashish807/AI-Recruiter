version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: recruiter_db
    restart: always
    environment:
      POSTGRES_USER: recruiter_user
      POSTGRES_PASSWORD: recruiter_password
      POSTGRES_DB: recruiter_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruiter_user -d recruiter_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: recruiter_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://recruiter_user:recruiter_password@postgres:5432/recruiter_intelligence
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: recruiter_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
